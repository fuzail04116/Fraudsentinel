version: '3.8'

# ============================================
# FraudSentinel — Full Stack Docker Compose
# ============================================

services:
  # ---------- Message Broker ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: fraudsentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fraudsentinel-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: fraudsentinel-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - fraudsentinel-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------- Database ----------
  postgres:
    image: postgres:15
    container_name: fraudsentinel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fraudsentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraudsentinel_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fraudsentinel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fraudsentinel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraudsentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- MLflow Tracking Server ----------
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: fraudsentinel-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraudsentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------- Apache Airflow ----------
  airflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: fraudsentinel-airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-fraudsentinel}:${POSTGRES_PASSWORD:-fraudsentinel_secret}@postgres:5432/${POSTGRES_DB:-fraudsentinel}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./reports:/opt/airflow/reports
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraudsentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------- FastAPI Service ----------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: fraudsentinel-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./mlruns:/app/mlruns
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - fraudsentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------- React Dashboard ----------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: fraudsentinel-dashboard
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fraudsentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  fraudsentinel-net:
    driver: bridge
